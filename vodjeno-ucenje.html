<!doctype html>
<html lang="sr-Latn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fungicidi 1 - vodjeno ucenje</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f5f7f6;
      color: #172428;
      letter-spacing: 0;
    }
    .app {
      min-height: 100vh;
      max-width: 980px;
      margin: 0 auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.12;
    }
    .sub {
      margin-top: 4px;
      color: #52666a;
      font-weight: 650;
      line-height: 1.3;
    }
    .badge {
      background: #fff;
      border: 1px solid #ccd9d7;
      border-radius: 8px;
      padding: 8px 10px;
      color: #0b6f6a;
      font-weight: 800;
      white-space: nowrap;
    }
    .panel {
      background: #fff;
      border: 1px solid #d7e1df;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(23, 36, 40, 0.08);
    }
    .path {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .step {
      border: 1px solid #d7e1df;
      background: #fbfdfc;
      border-radius: 8px;
      padding: 10px;
      min-height: 74px;
    }
    .step strong {
      display: block;
      margin-bottom: 4px;
      color: #172428;
    }
    .step span {
      display: block;
      color: #596c70;
      font-size: 13px;
      line-height: 1.25;
    }
    .setup {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }
    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 800;
      color: #53676a;
      margin-bottom: 6px;
    }
    select, button {
      width: 100%;
      min-height: 48px;
      border: 1px solid #b9c9c7;
      border-radius: 8px;
      background: #fff;
      color: #172428;
      font-size: 16px;
      padding: 10px 12px;
      -webkit-appearance: none;
      appearance: none;
    }
    select {
      background-image: linear-gradient(45deg, transparent 50%, #0b6f6a 50%), linear-gradient(135deg, #0b6f6a 50%, transparent 50%);
      background-position: calc(100% - 18px) 20px, calc(100% - 12px) 20px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 34px;
    }
    button {
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .primary { background: #0b6f6a; color: #fff; border-color: #0b6f6a; }
    .secondary { background: #f8fbfa; color: #315f5a; }
    .warm { background: #b95000; color: #fff; border-color: #b95000; }
    .ghost { background: #fff; color: #315f5a; }
    .quiz-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .meter {
      height: 10px;
      background: #e4ecea;
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 14px;
    }
    .bar { height: 100%; width: 0%; background: #b95000; transition: width 160ms ease; }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .pill {
      background: #e9f1f0;
      color: #315f5a;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 800;
    }
    .pill.level-prolaz { background: #e6f4ea; color: #1f5d33; }
    .pill.level-ispit { background: #fff3df; color: #8a4b00; }
    .pill.level-tesko { background: #fae8e5; color: #7d2f26; }
    .question {
      font-size: 22px;
      line-height: 1.32;
      font-weight: 850;
      margin: 8px 0 14px;
    }
    .answers { display: grid; gap: 10px; }
    .answer {
      min-height: 54px;
      text-align: left;
      line-height: 1.25;
      font-weight: 750;
      border-color: #cad8d6;
    }
    .answer.correct { background: #e6f4ea; border-color: #2f7b45; color: #1f5d33; }
    .answer.wrong { background: #fae8e5; border-color: #a74435; color: #7d2f26; }
    .reveal {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-left: 4px solid #0b6f6a;
      background: #eef7f5;
      border-radius: 6px;
      line-height: 1.45;
    }
    .reveal strong { display: block; margin-bottom: 5px; }
    .actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .hidden { display: none; }
    .result h2 { margin: 0 0 8px; font-size: 24px; }
    .review {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }
    .review-item {
      border: 1px solid #d9e3e1;
      border-radius: 8px;
      padding: 10px;
      background: #fbfdfd;
      line-height: 1.4;
    }
    .review-item strong { display: block; margin-bottom: 4px; }
    @media (max-width: 800px) {
      .setup { grid-template-columns: 1fr; }
      .path { grid-template-columns: 1fr 1fr; }
      .quiz-head { flex-direction: column; align-items: stretch; }
      .actions { grid-template-columns: 1fr; }
      .question { font-size: 20px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Fungicidi 1</h1>
        <div class="sub">Vodjeno ucenje za ispit</div>
      </div>
      <div class="badge" id="bankSize"></div>
    </header>

    <section class="panel" id="setupPanel">
      <div class="path">
        <div class="step"><strong>1. Ucenje</strong><span>Procita pitanje, vidi odgovor i objasnjenje.</span></div>
        <div class="step"><strong>2. Prolaz</strong><span>Osnovno: grupa, mehanizam, sta suzbija.</span></div>
        <div class="step"><strong>3. Ispit</strong><span>Prepoznavanje i vazne razlike izmedju supstanci.</span></div>
        <div class="step"><strong>4. Greske</strong><span>Ponavlja samo promasena pitanja.</span></div>
      </div>
      <div class="setup">
        <div>
          <label for="modeSelect">Rezim</label>
          <select id="modeSelect">
            <option value="ucenje">Ucenje</option>
            <option value="prolaz">Prolaz</option>
            <option value="ispit">Ispit</option>
            <option value="tesko">Tesko</option>
            <option value="greske">Samo greske</option>
            <option value="sve">Sve</option>
          </select>
        </div>
        <div>
          <label for="topicSelect">Tema</label>
          <select id="topicSelect"></select>
        </div>
        <div>
          <label for="focusSelect">Fokus</label>
          <select id="focusSelect">
            <option value="">Sve</option>
            <option value="Mehanizam">Mehanizam</option>
            <option value="Fizicke osobine">Fizicke osobine</option>
            <option value="Sta suzbija">Sta suzbija</option>
            <option value="Rezistentnost">Rezistentnost</option>
          </select>
        </div>
        <div>
          <label for="countSelect">Broj</label>
          <select id="countSelect">
            <option value="20">20</option>
            <option value="40">40</option>
            <option value="80">80</option>
            <option value="all">Sve</option>
          </select>
        </div>
        <button class="primary" id="startBtn" type="button">Start</button>
      </div>
    </section>

    <section class="panel hidden" id="quizPanel">
      <div class="quiz-head">
        <div id="progressText"></div>
        <div id="scoreText"></div>
      </div>
      <div class="meter"><div class="bar" id="bar"></div></div>
      <div class="meta">
        <span class="pill" id="modePill"></span>
        <span class="pill" id="topicPill"></span>
        <span class="pill" id="focusPill"></span>
        <span class="pill" id="levelPill"></span>
      </div>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answers"></div>
      <div class="reveal" id="reveal"></div>
      <div class="actions">
        <button class="secondary" id="restartBtn" type="button">Ponovo</button>
        <button class="ghost" id="markBtn" type="button">Ne znam</button>
        <button class="primary" id="nextBtn" type="button">Dalje</button>
      </div>
    </section>

    <section class="panel result hidden" id="resultPanel">
      <h2 id="resultTitle"></h2>
      <div id="resultText"></div>
      <div class="actions">
        <button class="secondary" id="newQuizBtn" type="button">Pocetak</button>
        <button class="warm" id="mistakesBtn" type="button">Greske</button>
        <button class="primary" id="sameQuizBtn" type="button">Isti rezim</button>
      </div>
      <div class="review" id="review"></div>
    </section>
  </div>

  <script>

trytis cinerea, ali bez bakterija i plamenjača","Samo Erysiphe necator i Blumeria graminis"],"explain":"U skripti su navedene plamenjače, krastavost, Taphrina, Alternaria, Monilinia, Cercospora i dr.","level":"prolaz","priority":-20,"topicIndex":0},{"id":6,"topic":"Bakar","focus":"Sta suzbija","question":"Na koje bakterije bakarna jedinjenja ispoljavaju toksično delovanje?","correct":"Erwinia amylovora, Pseudomonas syringae i Xanthomonas euvesicatoria","wrong":["Clavibacter, Agrobacterium i Rhizobium","Bacillus subtilis, Streptomyces i Azotobacter","Samo Plasmodiophora brassicae"],"explain":"Bakar ima i baktericidni značaj u zaštiti bilja.","level":"tesko","priority":-15,"topicIndex":0},{"id":7,"topic":"Bakar","focus":"Fizicke osobine","question":"Od čega se sastoji Bordovska čorba?","correct":"Od bakar-sulfata i kalcijum-hidroksida","wrong":["Od sumpora i kalijum-bikarbonata","Od mankozeba i metalaksila","Od folpeta i fosetil-aluminijuma"],"explain":"Bordovska čorba je smeša bakar-sulfata i kreča, odnosno kalcijum-hidroksida.","level":"prolaz","priority":-5,"topicIndex":0},{"id":8,"topic":"Bakar","focus":"Mehanizam","question":"Zašto se kreč dodaje u rastvor bakar-sulfata kod Bordovske čorbe?","correct":"Da spreči prebrzo oslobađanje Cu jona i smanji fitotoksičnost","wrong":["Da poveća sistemično kretanje ksilemom","Da aktivira QoI mehanizam","Da pretvori bakar u sumpor-dioksid"],"explain":"Samo bakar deluje fungicidno, a kreč smanjuje rizik od fitotoksičnih efekata.","level":"tesko","priority":-20,"topicIndex":0},{"id":9,"topic":"Bakar","focus":"Fizicke osobine","question":"Koje osobine najbolje opisuju bakar-sulfat?","correct":"Kristalna supstanca intenzivno plave boje, dobro rastvorljiva u vodi","wrong":["Crveni prah nerastvorljiv u vodi i foto nestabilan","Viskozna žućkasto-braon tečnost","Svetlo zeleni prah, nesistemik i lipofilan"],"explain":"Bakar-sulfat je plavi kamen i jedini bakarni oblik iz skripte koji se dobro rastvara u vodi.","level":"prolaz","priori     var STORAGE_KEY = "fungicidi_1_mistakes_v2";
    var state = {
      deck: [],
      index: 0,
      score: 0,
      answered: false,
      mode: "ucenje",
      selectedTopic: "",
      selectedFocus: "",
      selectedCount: "20",
      missed: []
    };

    function getMistakes() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function saveMistakes(ids) {
      var unique = [];
      var seen = {};
      for (var i = 0; i < ids.length; i++) {
        if (!seen[ids[i]]) {
          seen[ids[i]] = true;
          unique.push(ids[i]);
        }
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(unique));
      return unique.length;
    }

    function addMistake(id) {
      var ids = getMistakes();
      if (ids.indexOf(id) !== -1) {
        return { added: false, count: ids.length };
      }
      ids.push(id);
      return { added: true, count: saveMistakes(ids) };
    }

    function removeMistake(id) {
      var ids = getMistakes().filter(function (x) { return x !== id; });
      saveMistakes(ids);
    }

    function shuffle(arr) {
      var copy = arr.slice();
      for (var i = copy.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = copy[i];
        copy[i] = copy[j];
        copy[j] = tmp;
      }
      return copy;
    }

    function levelName(level) {
      if (level === "prolaz") return "Prolaz";
      if (level === "ispit") return "Ispit";
      return "Tesko";
    }

    function modeName(mode) {
      if (mode === "ucenje") return "Ucenje";
      if (mode === "prolaz") return "Prolaz";
      if (mode === "ispit") return "Ispit";
      if (mode === "tesko") return "Tesko";
      if (mode === "greske") return "Samo greske";
      return "Sve";
    }

    function uniqueTopics() {
      var seen = {};
      var list = [];
      for (var i = 0; i < QUESTIONS.length; i++) {
        if (!seen[QUESTIONS[i].topic]) {
          seen[QUESTIONS[i].topic] = true;
          list.push(QUESTIONS[i].topic);
        }
      }
      return list;
    }

    function fillSelects() {
      var topicSelect = document.getElementById("topicSelect");
      topicSelect.innerHTML = "";
      var all = document.createElement("option");
      all.value = "";
      all.textContent = "Sve";
      topicSelect.appendChild(all);
      var topics = uniqueTopics();
      for (var i = 0; i < topics.length; i++) {
        var opt = document.createElement("option");
        opt.value = topics[i];
        opt.textContent = topics[i];
        topicSelect.appendChild(opt);
      }
      updateBadge();
    }

    function updateBadge() {
      var count = getMistakes().length;
      document.getElementById("bankSize").textContent = QUESTIONS.length + " pitanja | Greske: " + count;
      return count;
    }

    function sortForLearning(list) {
      return list.slice().sort(function (a, b) {
        var levelOrder = { prolaz: 0, ispit: 1, tesko: 2 };
        if (levelOrder[a.level] !== levelOrder[b.level]) return levelOrder[a.level] - levelOrder[b.level];
        if (a.topicIndex !== b.topicIndex) return a.topicIndex - b.topicIndex;
        if (a.priority !== b.priority) return a.priority - b.priority;
        return a.id - b.id;
      });
    }

    function buildDeck() {
      var mode = document.getElementById("modeSelect").value;
      var topic = document.getElementById("topicSelect").value;
      var focus = document.getElementById("focusSelect").value;
      var count = document.getElementById("countSelect").value;
      var mistakeIds = getMistakes();
      var filtered = [];

      for (var i = 0; i < QUESTIONS.length; i++) {
        var item = QUESTIONS[i];
        if (topic && item.topic !== topic) continue;
        if (focus && item.focus !== focus) continue;
        if (mode === "prolaz" && item.level !== "prolaz") continue;
        if (mode === "ispit" && item.level === "tesko") continue;
        if (mode === "tesko" && item.level !== "tesko") continue;
        if (mode === "greske" && mistakeIds.indexOf(item.id) === -1) continue;
        filtered.push(item);
      }

      if (mode === "ucenje") {
        filtered = sortForLearning(filtered);
      } else if (mode === "prolaz") {
        filtered = shuffle(sortForLearning(filtered).slice(0, Math.max(filtered.length, 1)));
      } else {
        filtered = shuffle(filtered);
      }

      if (count !== "all") filtered = filtered.slice(0, parseInt(count, 10));

      state.deck = filtered;
      state.index = 0;
      state.score = 0;
      state.answered = false;
      state.mode = mode;
      state.selectedTopic = topic;
      state.selectedFocus = focus;
      state.selectedCount = count;
      state.missed = [];
    }

    function showPanel(id) {
      document.getElementById("setupPanel").className = "panel hidden";
      document.getElementById("quizPanel").className = "panel hidden";
      document.getElementById("resultPanel").className = "panel result hidden";
      document.getElementById(id).className = id === "resultPanel" ? "panel result" : "panel";
    }

    function startQuiz() {
      buildDeck();
      if (!state.deck.length) {
        alert("Nema pitanja za ovaj izbor.");
        return;
      }
      showPanel("quizPanel");
      renderQuestion();
    }

    function renderQuestion() {
      var item = state.deck[state.index];
      state.answered = false;
      document.getElementById("progressText").textContent = "Pitanje " + (state.index + 1) + "/" + state.deck.length;
      document.getElementById("scoreText").textContent = state.mode === "ucenje" ? "Ucenje" : "Tacno " + state.score;
      document.getElementById("bar").style.width = Math.round((state.index / state.deck.length) * 100) + "%";
      document.getElementById("modePill").textContent = modeName(state.mode);
      document.getElementById("topicPill").textContent = item.topic;
      document.getElementById("focusPill").textContent = item.focus;
      var levelPill = document.getElementById("levelPill");
      levelPill.textContent = levelName(item.level);
      levelPill.className = "pill level-" + item.level;
      document.getElementById("questionText").textContent = item.question;
      document.getElementById("reveal").style.display = "none";
      document.getElementById("reveal").innerHTML = "";
      document.getElementById("nextBtn").disabled = state.mode !== "ucenje";
      var alreadySaved = getMistakes().indexOf(item.id) !== -1;
      var markBtn = document.getElementById("markBtn");
      if (state.mode === "greske") {
        markBtn.disabled = true;
        markBtn.textContent = "Vec je u greskama";
      } else {
        markBtn.disabled = alreadySaved;
        markBtn.textContent = alreadySaved ? "Vec u greskama" : (state.mode === "ucenje" ? "Ne znam - dodaj" : "Sacuvaj gresku");
      }

      var answers = [{ text: item.correct, ok: true }].concat(item.wrong.map(function (w) {
        return { text: w, ok: false };
      }));
      if (state.mode !== "ucenje") answers = shuffle(answers);

      var wrap = document.getElementById("answers");
      wrap.innerHTML = "";
      for (var i = 0; i < answers.length; i++) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer";
        btn.textContent = answers[i].text;
        btn.setAttribute("data-ok", answers[i].ok ? "1" : "0");
        btn.addEventListener("click", chooseAnswer);
        wrap.appendChild(btn);
      }

      if (state.mode === "ucenje") {
        showReveal(item, "Odgovor");
        var buttons = wrap.getElementsByTagName("button");
        for (var j = 0; j < buttons.length; j++) {
          buttons[j].disabled = true;
        }
      }
    }

    function showReveal(item, title) {
      var box = document.getElementById("reveal");
      box.innerHTML = "<strong>" + title + ": " + item.correct + "</strong><div>" + item.explain + "</div>";
      box.style.display = "block";
    }

    function chooseAnswer(evt) {
      if (state.answered || state.mode === "ucenje") return;
      state.answered = true;
      var item = state.deck[state.index];
      var btn = evt.currentTarget;
      var ok = btn.getAttribute("data-ok") === "1";
      var buttons = document.getElementById("answers").getElementsByTagName("button");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
        if (buttons[i].getAttribute("data-ok") === "1") buttons[i].className = "answer correct";
      }
      if (ok) {
        state.score += 1;
        removeMistake(item.id);
      } else {
        btn.className = "answer wrong";
        addMistake(item.id);
        state.missed.push(item);
      }
      document.getElementById("scoreText").textContent = "Tacno " + state.score;
      showReveal(item, ok ? "Tacno" : "Tacan odgovor");
      document.getElementById("nextBtn").disabled = false;
      updateBadge();
    }

    function markCurrent() {
      var item = state.deck[state.index];
      var result = addMistake(item.id);
      if (state.missed.indexOf(item) === -1) state.missed.push(item);
      var buttons = document.getElementById("answers").getElementsByTagName("button");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
        if (buttons[i].getAttribute("data-ok") === "1") buttons[i].className = "answer correct";
      }
      showReveal(item, result.added ? "Dodato u greske" : "Vec je u greskama");
      document.getElementById("nextBtn").disabled = false;
      document.getElementById("markBtn").textContent = result.added ? "Sacuvano" : "Vec je u greskama";
      document.getElementById("markBtn").disabled = true;
      state.answered = true;
      updateBadge();
    }

    function nextQuestion() {
      if (state.mode !== "ucenje" && !state.answered) return;
      state.index += 1;
      if (state.index >= state.deck.length) finishQuiz();
      else renderQuestion();
    }

    function finishQuiz() {
      document.getElementById("bar").style.width = "100%";
      showPanel("resultPanel");
      var percent = state.mode === "ucenje" ? null : Math.round((state.score / state.deck.length) * 100);
      document.getElementById("resultTitle").textContent = state.mode === "ucenje" ? "Krug ucenja zavrsen" : state.score + "/" + state.deck.length + " (" + percent + "%)";
      var advice = "Sledeci korak: ";
      if (state.mode === "ucenje") advice += "uradi Prolaz dok ne bude 80%+.";
      else if (percent >= 85 && state.mode === "prolaz") advice += "predji na Ispit.";
      else if (percent >= 80 && state.mode === "ispit") advice += "uradi Tesko i zatim Samo greske.";
      else if (percent >= 75) advice += "ponovi Samo greske.";
      else advice += "vrati se na Ucenje za iste teme.";
      document.getElementById("resultText").textContent = modeName(state.mode) + " | " + advice;

      var review = document.getElementById("review");
      review.innerHTML = "";
      var list = state.missed.slice(0, 20);
      if (!list.length) {
        var ok = document.createElement("div");
        ok.className = "review-item";
        ok.textContent = state.mode === "ucenje" ? "Nista nije oznaceno kao nepoznato." : "Bez gresaka u ovom krugu.";
        review.appendChild(ok);
        return;
      }
      for (var i = 0; i < list.length; i++) {
        var div = document.createElement("div");
        div.className = "review-item";
        div.innerHTML = "<strong>" + list[i].question + "</strong><div>Tacno: " + list[i].correct + "</div><div>" + list[i].explain + "</div>";
        review.appendChild(div);
      }
    }

    function restartSame() {
      document.getElementById("modeSelect").value = state.mode;
      document.getElementById("topicSelect").value = state.selectedTopic;
      document.getElementById("focusSelect").value = state.selectedFocus;
      document.getElementById("countSelect").value = state.selectedCount;
      startQuiz();
    }

    function startMistakes() {
      document.getElementById("modeSelect").value = "greske";
      document.getElementById("topicSelect").value = "";
      document.getElementById("focusSelect").value = "";
      document.getElementById("countSelect").value = "all";
      startQuiz();
    }

    function backToSetup() {
      showPanel("setupPanel");
      updateBadge();
    }

    document.getElementById("startBtn").addEventListener("click", startQuiz);
    document.getElementById("nextBtn").addEventListener("click", nextQuestion);
    document.getElementById("restartBtn").addEventListener("click", restartSame);
    document.getElementById("markBtn").addEventListener("click", markCurrent);
    document.getElementById("newQuizBtn").addEventListener("click", backToSetup);
    document.getElementById("sameQuizBtn").addEventListener("click", restartSame);
    document.getElementById("mistakesBtn").addEventListener("click", startMistakes);
    fillSelects();
  </script>
</body>
</html>
