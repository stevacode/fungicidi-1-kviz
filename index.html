<!doctype html>
<html lang="sr-Latn">
<head>
  <meta charset="utf-8">

  <title>Fungicidi 1 - kviz</title>
  <style>
    * { box-sizing: border-box; }
    body {

    }
    .app {
      min-height: 100vh;
      padding: 16px;
      display: -webkit-flex;

      flex-direction: column;
      gap: 12px;
      max-width: 980px;
      margin: 0 auto;
    }
    header {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;

      padding: 10px 0;

      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 10px 25px rgba(29, 42, 46, 0.08);
    }

      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));

    }

      color: #51676b;
      margin-bottom: 6px;
    }
    select, button {
      width: 100%;
      min-height: 48px;
      border-radius: 8px;
      border: 1px solid #b8c9c7;
      background: #ffffff;
      color: #1d2a2e;
      font-size: 16px;
      padding: 10px 12px;
      -webkit-appearance: none;
      appearance: none;
    }
    select {
      background-image: linear-gradient(45deg, transparent 50%, #315f5a 50%), linear-gradient(135deg, #315f5a 50%, transparent 50%);
      background-position: calc(100% - 18px) 20px, calc(100% - 12px) 20px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;

    }
    button {

      cursor: pointer;
      -webkit-tap-highlight-color: transparent;

    }
    .secondary {
      background: #f8fbfb;
      color: #315f5a;
    }
    .danger {
      background: #8f2f24;
      color: #ffffff;
      border-color: #8f2f24;
    }
    .quiz-head {
      display: -webkit-flex;
      display: flex;

      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .meter {
      height: 10px;
      background: #e4ecea;
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 14px;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: #b95000;
      transition: width 180ms ease;
    }
    .meta {
      display: -webkit-flex;
      display: flex;
      gap: 8px;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      background: #e9f1f0;
      color: #315f5a;
      font-size: 13px;
      font-weight: 800;
    }
    .question {
      font-size: 22px;
      line-height: 1.32;
      font-weight: 800;
      margin: 8px 0 14px;
    }
    .answers {
      display: grid;
      gap: 10px;
    }
    .answer {
      text-align: left;
      line-height: 1.25;
      background: #ffffff;
      border: 1px solid #cad8d6;
      min-height: 54px;
      font-weight: 700;
    }
    .answer.correct {
      background: #e6f4ea;
      border-color: #2f7b45;
      color: #1f5d33;
    }
    .answer.wrong {
      background: #fae8e5;
      border-color: #a74435;
      color: #7d2f26;
    }
    .explain {

      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .hidden { display: none; }
    .result h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .review {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }
    .review-item {
      border: 1px solid #d9e3e1;
      border-radius: 8px;

      line-height: 1.4;
    }

      display: block;
      margin-bottom: 4px;
    }
    @media (max-width: 720px) {
      .app { padding: 12px; }

      h1 { font-size: 21px; }

      .quiz-head { -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: stretch; align-items: stretch; }
      .question { font-size: 20px; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Fungicidi 1</h1>
      <div class="badge" id="bankSize">0 pitanja</div>
    </header>

    <section class="panel" id="setupPanel">
      <div class="setup">
        <div>
          <label for="topicSelect">Tema</label>
          <select id="topicSelect"></select>
        </div>
        <div>
          <label for="focusSelect">Fokus</label>
          <select id="focusSelect">
            <option value="">Sve</option>
            <option value="Mehanizam">Mehanizam</option>
            <option value="Fizicke osobine">Fizičke osobine</option>
            <option value="Sta suzbija">Šta suzbija</option>
            <option value="Rezistentnost">Rezistentnost</option>
          </select>
        </div>
        <div>
          <label for="countSelect">Broj pitanja</label>
          <select id="countSelect">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="80">80</option>
            <option value="all">Sve</option>
          </select>
        </div>
        <button class="primary" id="startBtn" type="button">Start</button>
      </div>
    </section>

    <section class="panel hidden" id="quizPanel">
      <div class="quiz-head">
        <div id="progressText">Pitanje 1/1</div>
        <div id="scoreText">Tačno 0</div>
      </div>
      <div class="meter"><div class="bar" id="bar"></div></div>
      <div class="meta">
        <span class="pill" id="topicPill"></span>
        <span class="pill" id="focusPill"></span>
      </div>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answers"></div>
      <div class="explain" id="explain"></div>
      <div class="actions">
        <button class="secondary" id="restartBtn" type="button">Ponovo</button>
        <button class="primary" id="nextBtn" type="button">Dalje</button>
      </div>
    </section>

    <section class="panel result hidden" id="resultPanel">
      <h2 id="resultTitle"></h2>
      <div id="resultText"></div>
      <div class="actions">
        <button class="secondary" id="newQuizBtn" type="button">Novi kviz</button>
        <button class="primary" id="sameQuizBtn" type="button">Ista oblast</button>
      </div>
      <div class="review" id="review"></div>
    </section>
  </div>

  <script>
    var QUESTIONS = [];
    function q(topic, focus, question, correct, wrong1, wrong2, wrong3, explain) {
      QUESTIONS.push({
        topic: topic,
        focus: focus,
        question: question,
        correct: correct,
        wrong: [wrong1, wrong2, wrong3],
        explain: explain
      });
    }

    q("Bakar", "Mehanizam", "Na čemu se zasniva fungicidna aktivnost bakarnih jedinjenja?", "Na denaturaciji proteinskih delova enzima gljiva", "Na inhibiciji sinteze metionina", "Na blokadi Qo mesta u kompleksu III", "Na inhibiciji 3-keto-reduktaze", "Bakarni joni reaguju sa grupama u proteinima enzima i čine ih neaktivnim.");
    q("Bakar", "Mehanizam", "Kako nerastvorni bakarni oblik prelazi u aktivan rastvorljiv oblik?", "U kontaktu sa eksudatima spora gljiva oslobađaju se bakarni joni", "Isključivo pod dejstvom UV svetla nastaje karbendazim", "U biljci se pretvara u UK-2A", "Alkalije ga pretvaraju u metionin", "Eksudati spora omogućavaju oslobađanje Cu jona koji deluju na enzime.");
    q("Bakar", "Mehanizam", "Koje enzimske grupe su naročito osetljive na Cu jone?", "Sulfhidrilne SH grupe", "Metoksi-karbamatne grupe", "Sterolne C14 grupe", "Glukanske beta veze", "Skripta posebno naglašava enzime sa SH grupom kao najosetljivije.");
    q("Bakar", "Sta suzbija", "Koji spektar je karakterističan za neorganska jedinjenja bakra?", "Širok spektar u voćarstvu, vinogradarstvu, ratarstvu, povrtarstvu i ukrasnom bilju", "Samo pepelnice na vinovoj lozi", "Samo skladišne bolesti citrusa", "Samo fuzarioze strnih žita", "Bakarna jedinjenja su širokog spektra i koriste se u više proizvodnji.");
    q("Bakar", "Sta suzbija", "Koji patogeni su navedeni u spektru bakarnih jedinjenja?", "Plasmopara viticola, Phytophthora infestans, Venturia spp. i Taphrina deformans", "Tilletia tritici, Ustilago nuda i Fusarium spp. isključivo", "Botrytis cinerea, ali bez bakterija i plamenjača", "Samo Erysiphe necator i Blumeria graminis", "U skripti su navedene plamenjače, krastavost, Taphrina, Alternaria, Monilinia, Cercospora i dr.");
    q("Bakar", "Sta suzbija", "Na koje bakterije bakarna jedinjenja ispoljavaju toksično delovanje?", "Erwinia amylovora, Pseudomonas syringae i Xanthomonas euvesicatoria", "Clavibacter, Agrobacterium i Rhizobium", "Bacillus subtilis, Streptomyces i Azotobacter", "Samo Plasmodiophora brassicae", "Bakar ima i baktericidni značaj u zaštiti bilja.");
    q("Bakar", "Fizicke osobine", "Od čega se sastoji Bordovska čorba?", "Od bakar-sulfata i kalcijum-hidroksida", "Od sumpora i kalijum-bikarbonata", "Od mankozeba i metalaksila", "Od folpeta i fosetil-aluminijuma", "Bordovska čorba je smeša bakar-sulfata i kreča, odnosno kalcijum-hidroksida.");
    q("Bakar", "Mehanizam", "Zašto se kreč dodaje u rastvor bakar-sulfata kod Bordovske čorbe?", "Da spreči prebrzo oslobađanje Cu jona i smanji fitotoksičnost", "Da poveća sistemično kretanje ksilemom", "Da aktivira QoI mehanizam", "Da pretvori bakar u sumpor-dioksid", "Samo bakar deluje fungicidno, a kreč smanjuje rizik od fitotoksičnih efekata.");
    q("Bakar", "Fizicke osobine", "Koje osobine najbolje opisuju bakar-sulfat?", "Kristalna supstanca intenzivno plave boje, dobro rastvorljiva u vodi", "Crveni prah nerastvorljiv u vodi i foto nestabilan", "Viskozna žućkasto-braon tečnost", "Svetlo zeleni prah, nesistemik i lipofilan", "Bakar-sulfat je plavi kamen i jedini bakarni oblik iz skripte koji se dobro rastvara u vodi.");
    q("Bakar", "Sta suzbija", "Za šta se bakar-sulfat može koristiti zbog algicidnog delovanja?", "Za suzbijanje algi u bazenima, jezerima, ribnjacima i drugim vodenim površinama", "Za suzbijanje pepelnice pšenice u klasanju", "Za tretiranje skladišnih citrusa protiv Penicillium spp.", "Za isključivo suzbijanje Sclerotinia sclerotiorum", "Skripta posebno navodi algicidno delovanje bakar-sulfata.");
    q("Bakar", "Fizicke osobine", "Kako je opisan bakar-oksihlorid?", "Čvrsta praškasta plavičasto-zelena supstanca, praktično nerastvorljiva u vodi", "Bezbojna viskozna tečnost, lako rastvorljiva u vodi", "Žuti prah koji se dobro rastvara u ugljen-disulfidu", "Beli kristal sa ekstremno visokom rastvorljivošću u vodi", "Bakar-oksihlorid je plavičasto-zelen prah i praktično je nerastvorljiv u vodi.");
    q("Bakar", "Fizicke osobine", "Sa čime bakar-oksihlorid nije kompatibilan?", "Sa organofosfatima, karbamatima i sumporno-krečnom čorbom", "Sa mankozebom i Cu-oksihloridom", "Sa svim multi-site fungicidima bez izuzetka", "Sa vodom, jer se u njoj potpuno razlaže", "Skripta navodi nekompatibilnost sa organofosfatima, karbamatima i sumporno-krečnom čorbom.");
    q("Bakar", "Fizicke osobine", "Zašto je bakar-oksid crvene boje?", "Zato što je bakar jednovalentan u Cu2O", "Zato što sadrži maneb i cink", "Zato što prelazi u karbendazim", "Zato što sadrži sumpor u koloidnom obliku", "Bakar-oksid je Cu2O, a crvena boja je vezana za jednovalentni bakar.");
    q("Bakar", "Sta suzbija", "U kojoj primeni se danas navodi bakar-oksid?", "U gotovim smešama sa mineralnim uljima za prezimljujuće forme patogena", "Samo za skladišne bolesti citrusa", "Za isključivo suzbijanje pepelnica u cvetanju jabuke", "Za inhibiciju metionina kod Botrytis cinerea", "Naveden je za prezimljujuće forme kao Venturia pyrina i Taphrina deformans.");
    q("Bakar", "Fizicke osobine", "Koje osobine odgovaraju bakar-hidroksidu?", "Čvrsta praškasta plavo-zelena supstanca, slabo rastvorljiva u vodi", "Bezbojni kristali koji se dobro rastvaraju u vodi", "Braonkasta tečnost visokog napona pare", "Žuta supstanca koja se primenjuje samo u elementarnom stanju", "Bakar-hidroksid je plavo-zelen prah i često se koristi kao baktericid.");
    q("Bakar", "Sta suzbija", "Za šta se koristi bakar-hidroksid?", "Za plamenjače, pegavosti, Alternaria sp., Septoria sp. i druga oboljenja", "Samo za Penicillium u skladištu", "Samo za rđe strnih žita", "Samo za Botrytis cinerea u berbi", "Skripta ga vezuje za plamenjače, pegavosti i baktericidnu primenu.");
    q("Bakar", "Fizicke osobine", "Kada bakar-hidroksid može biti fitotoksičan?", "U uslovima hladnog i vlažnog vremena", "Samo pri temperaturama iznad 35 C u suvom vremenu", "Isključivo ako se primeni u zemljište", "Nikada, jer je potpuno netoksičan", "U skripti je posebno naglašena fitotoksičnost u hladnom i vlažnom vremenu.");

    q("Sumpor", "Fizicke osobine", "U kom stanju se sumpor primenjuje kao fungicid?", "U elementarnom stanju", "Isključivo kao organski sistemik", "Samo kao bakarni helat", "Kao derivat metionina", "Sumpor se primenjuje u elementarnom stanju.");
    q("Sumpor", "Fizicke osobine", "Koja su dva tipa formulacije sumpora navedena u skripti?", "Sumporni prah i kvašljivi sumpor", "EC i granule za zemljište", "Bordovska čorba i bakar-oksihlorid", "Samo vodeni rastvor", "Dostupan je kao sumporni prah i kvašljivi sumpor.");
    q("Sumpor", "Fizicke osobine", "Koja je približna tačka topljenja sumpora iz skripte?", "115 C", "50 C", "220 C", "413 C", "U skripti je navedeno 115 C.");
    q("Sumpor", "Fizicke osobine", "Kako se sumpor ponaša u vodi i ugljen-disulfidu?", "Nerastvorljiv je u vodi, a dobro rastvorljiv u ugljen-disulfidu", "Dobro se rastvara u vodi, a nerastvorljiv je u ugljen-disulfidu", "Ekstremno je rastvorljiv u vodi", "U vodi se odmah pretvara u karbendazim", "Sumpor je nerastvorljiv u vodi, a dobro se rastvara u CS2.");
    q("Sumpor", "Fizicke osobine", "Šta se dešava sa sumporom u prisustvu jakih alkalija?", "Obrazuju se sulfidi", "Nastaje UK-2A", "Nastaje Bordovska čorba", "Nastaje etilen-bis-izotiocijanat", "Skripta navodi nastanak sulfida u prisustvu jakih alkalija.");
    q("Sumpor", "Mehanizam", "Koji oksidi sumpora se povezuju sa njegovim fungicidnim delovanjem?", "Sumpor-dioksid i sumpor-trioksid", "Azot-monoksid i azot-dioksid", "Ugljen-monoksid i ugljen-dioksid", "Bakar-oksid i bakar-hidroksid", "SO2 i SO3 deluju kao jaka oksidaciona sredstva i narušavaju redoks sisteme.");
    q("Sumpor", "Mehanizam", "Prema teoriji direktnog delovanja, kako sumpor remeti metabolizam gljiva?", "Ponaša se kao akceptor vodonika i remeti hidrogenaciju i dehidrogenaciju", "Vezuje se za C14 demetilazu kao DMI", "Inhibira sintezu metionina", "Blokira histidin kinazu osmotskog puta", "Sumpor se opisuje kao akceptor H2 i konkurent u elektronskom transportu.");
    q("Sumpor", "Mehanizam", "Zašto su čestice koloidnog sumpora važne kod pepelnica?", "Ponašaju se kao mikro sočiva i termalno oštećuju epifitnu miceliju", "Pretvaraju se u kalcijum-hidroksid na listu", "Indukuju CYP51A1 ekspresiju", "Razlažu se u karbendazim u zemljištu", "Mikro-sočiva fokusiraju sunčevu svetlost i dovode do kauterizacije hifa.");
    q("Sumpor", "Fizicke osobine", "Koja je optimalna temperatura primene sumpora?", "18-28 C", "0-8 C", "30-40 C", "Samo ispod 16 C", "Ispod 16 C deluje slabije, a iznad 30 C može biti fitotoksičan.");
    q("Sumpor", "Sta suzbija", "Koji je najvažniji spektar sumpora?", "Pepelnice iz familije Erysiphaceae i grinje", "Samo plamenjače iz Oomycetes", "Samo bakterijske plamenjače", "Samo skladišne plesni citrusa", "Sumpor suzbija pepelnice i ima akaricidno delovanje.");
    q("Sumpor", "Sta suzbija", "Koja je napomena za sumpor u jabuci?", "Ne primenjivati u toku fenofaze cvetanja", "Uvek primenjivati samo u cvetanju", "Koristiti samo za dezinfekciju alata", "Mešati sa jakim alkalijama", "Skripta naglašava da se ne koristi u jabuci tokom cvetanja.");

    q("Ditiokarbamati", "Sta suzbija", "Koje ditiokarbamate navodi skripta?", "Mankozeb, ciram i metiram", "Kaptan, folpet i kaptafol", "Metalaksil, benalaksil i mefenoksam", "Pirimetanil, ciprodinil i fludioksonil", "U ovoj grupi su mankozeb, ciram i metiram.");
    q("Ditiokarbamati", "Mehanizam", "Kako ditiokarbamati deluju na enzime gljiva?", "Kao helatni agensi reaguju sa tiol SH grupama", "Inhibiraju C14 demetilaciju lanosterola", "Blokiraju Qi mesto citohrom bc1 kompleksa", "Indukuju samo fitoaleksine bez direktnog delovanja", "Osnov je reakcija sa tiol grupama i inhibicija sulfhidrilnih enzima.");
    q("Ditiokarbamati", "Mehanizam", "Zašto se mankozeb može smatrati pro-fungicidom?", "Posle izlaganja vodi i UV svetlu nastaju toksični izotiocijanatni metaboliti", "U biljci prelazi u karbendazim", "U zemljištu se vraća u UK-2A", "U vodi oslobađa sumpor-trioksid", "Mankozeb se razgrađuje do metabolita koji ometaju enzime sa SH grupom.");
    q("Ditiokarbamati", "Fizicke osobine", "Šta je mankozeb po sastavu?", "Kompleksno jedinjenje maneba sa cinkom, sa Mn i Zn", "Bakar-sulfat sa kalcijum-hidroksidom", "Cijano-imidazolni peronosporicid", "Hidroksianilidni botriticid", "Skripta navodi mankozeb kao kompleks maneba sa Zn, 20% Mn i 2,5% Zn.");
    q("Ditiokarbamati", "Fizicke osobine", "Kako se mankozeb ponaša posle deponovanja na list?", "Ostaje na površini lista i ne prodire kroz kutikulu", "Brzo se translocira ksilemom i floemom", "Isključivo deluje gasnom fazom", "Prodire u protoplast pšenice i prelazi u UK-2A", "Mankozeb je multi-site kontaktni fungicid.");
    q("Ditiokarbamati", "Sta suzbija", "Koji patogeni su tipični za primenu mankozeba?", "Venturia inaequalis, Plasmopara viticola, Phytophthora infestans i Alternaria solani", "Samo Penicillium i Aspergillus u skladištu", "Samo Erysiphe necator u vinovoj lozi", "Samo Tilletia i Ustilago na semenu", "Mankozeb je širokog spektra i važan partner u zaštiti više kultura.");
    q("Ditiokarbamati", "Rezistentnost", "Koja je antirezistentna uloga mankozeba?", "Čest je partner sistemičnim fungicidima visokog rizika", "Sam se sme koristiti neograničeno kao single-site fungicid", "Koristi se samo posle vidljivih simptoma", "Povećava selekcioni pritisak ako se meša sa bakrom", "Zbog multi-site delovanja smanjuje rizik kada je partner sistemicima.");

    function shuffle(arr) {
      var copy = arr.slice();
      for (var i = copy.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = copy[i];
        copy[i] = copy[j];
        copy[j] = tmp;
      }
      return copy;
    }

    function uniqueTopics() {
      var seen = {};
      var list = [];
      for (var i = 0; i < QUESTIONS.length; i++) {
        if (!seen[QUESTIONS[i].topic]) {
          seen[QUESTIONS[i].topic] = true;
          list.push(QUESTIONS[i].topic);
        }
      }
      return list.sort();
    }

    function fillSelects() {
      var topicSelect = document.getElementById("topicSelect");
      topicSelect.innerHTML = "";
      var all = document.createElement("option");
      all.value = "";
      all.textContent = "Sve";
      topicSelect.appendChild(all);
      var topics = uniqueTopics();
      for (var i = 0; i < topics.length; i++) {
        var opt = document.createElement("option");
        opt.value = topics[i];
        opt.textContent = topics[i];
        topicSelect.appendChild(opt);
      }
      document.getElementById("bankSize").textContent = QUESTIONS.length + " pitanja";
    }

    function buildDeck() {
      var topic = document.getElementById("topicSelect").value;
      var focus = document.getElementById("focusSelect").value;
      var count = document.getElementById("countSelect").value;
      var filtered = [];
      for (var i = 0; i < QUESTIONS.length; i++) {
        if (topic && QUESTIONS[i].topic !== topic) continue;
        if (focus && QUESTIONS[i].focus !== focus) continue;
        filtered.push(QUESTIONS[i]);
      }
      filtered = shuffle(filtered);
      if (count !== "all") {
        filtered = filtered.slice(0, parseInt(count, 10));
      }
      state.deck = filtered;
      state.index = 0;
      state.score = 0;
      state.answered = false;
      state.selectedTopic = topic;
      state.selectedFocus = focus;
      state.selectedCount = count;
      state.missed = [];
    }

    function showPanel(id) {
      document.getElementById("setupPanel").className = "panel hidden";
      document.getElementById("quizPanel").className = "panel hidden";
      document.getElementById("resultPanel").className = "panel result hidden";
      if (id === "resultPanel") {
        document.getElementById(id).className = "panel result";
      } else {
        document.getElementById(id).className = "panel";
      }
    }

    function startQuiz() {
      buildDeck();
      if (!state.deck.length) {
        alert("Nema pitanja za izabrani filter.");
        return;
      }
      showPanel("quizPanel");
      renderQuestion();
    }

    function renderQuestion() {
      var item = state.deck[state.index];
      state.answered = false;
      document.getElementById("progressText").textContent = "Pitanje " + (state.index + 1) + "/" + state.deck.length;
      document.getElementById("scoreText").textContent = "Tačno " + state.score;
      document.getElementById("bar").style.width = Math.round((state.index / state.deck.length) * 100) + "%";
      document.getElementById("topicPill").textContent = item.topic;
      document.getElementById("focusPill").textContent = item.focus;
      document.getElementById("questionText").textContent = item.question;
      document.getElementById("explain").style.display = "none";
      document.getElementById("explain").textContent = "";
      document.getElementById("nextBtn").disabled = true;

      var answers = [{ text: item.correct, ok: true }];
      for (var i = 0; i < item.wrong.length; i++) {
        answers.push({ text: item.wrong[i], ok: false });
      }
      answers = shuffle(answers);
      var wrap = document.getElementById("answers");
      wrap.innerHTML = "";
      for (var a = 0; a < answers.length; a++) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer";
        btn.textContent = answers[a].text;
        btn.setAttribute("data-ok", answers[a].ok ? "1" : "0");
        btn.addEventListener("click", chooseAnswer);
        wrap.appendChild(btn);
      }
    }

    function chooseAnswer(evt) {
      if (state.answered) return;
      state.answered = true;
      var btn = evt.currentTarget;
      var ok = btn.getAttribute("data-ok") === "1";
      var buttons = document.getElementById("answers").getElementsByTagName("button");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
        if (buttons[i].getAttribute("data-ok") === "1") {
          buttons[i].className = "answer correct";
        }
      }
      if (ok) {
        state.score += 1;
      } else {
        btn.className = "answer wrong";
        var item = state.deck[state.index];
        state.missed.push({
          question: item.question,
          correct: item.correct,
          explain: item.explain
        });
      }
      var current = state.deck[state.index];
      document.getElementById("scoreText").textContent = "Tačno " + state.score;
      document.getElementById("explain").textContent = current.explain;
      document.getElementById("explain").style.display = "block";
      document.getElementById("nextBtn").disabled = false;
    }

    function nextQuestion() {
      if (!state.answered) return;
      state.index += 1;
      if (state.index >= state.deck.length) {
        finishQuiz();
      } else {
        renderQuestion();
      }
    }

    function finishQuiz() {
      document.getElementById("bar").style.width = "100%";
      showPanel("resultPanel");
      var percent = Math.round((state.score / state.deck.length) * 100);
      document.getElementById("resultTitle").textContent = state.score + "/" + state.deck.length + " (" + percent + "%)";
      document.getElementById("resultText").textContent = "Tema: " + (state.selectedTopic || "sve") + " | Fokus: " + (state.selectedFocus || "sve");
      var review = document.getElementById("review");
      review.innerHTML = "";
      if (!state.missed.length) {
        var perfect = document.createElement("div");
        perfect.className = "review-item";
        perfect.textContent = "Sve tačno.";
        review.appendChild(perfect);
        return;
      }
      for (var i = 0; i < state.missed.length; i++) {
        var div = document.createElement("div");
        div.className = "review-item";
        var s = document.createElement("strong");
        s.textContent = state.missed[i].question;
        var p1 = document.createElement("div");
        p1.textContent = "Tačno: " + state.missed[i].correct;
        var p2 = document.createElement("div");
        p2.textContent = state.missed[i].explain;
        div.appendChild(s);
        div.appendChild(p1);
        div.appendChild(p2);
        review.appendChild(div);
      }
    }

    function restartSame() {
      document.getElementById("topicSelect").value = state.selectedTopic;
      document.getElementById("focusSelect").value = state.selectedFocus;
      document.getElementById("countSelect").value = state.selectedCount;
      startQuiz();
    }

    function backToSetup() {
      showPanel("setupPanel");
    }

    document.getElementById("startBtn").addEventListener("click", startQuiz);
    document.getElementById("nextBtn").addEventListener("click", nextQuestion);
    document.getElementById("restartBtn").addEventListener("click", restartSame);
    document.getElementById("newQuizBtn").addEventListener("click", backToSetup);
    document.getElementById("sameQuizBtn").addEventListener("click", restartSame);

    fillSelects();
  </script>
</body>
</html>
